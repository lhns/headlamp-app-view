name: release

# Build the plugin carrier image and push it to GHCR.
#   push to main   -> ghcr.io/<owner>/headlamp-app-view:sha-<short>
#   tag vX.Y.Z     -> ghcr.io/<owner>/headlamp-app-view:X.Y.Z + :latest
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: v
        run: |
          IMG="ghcr.io/${{ github.repository_owner }}/headlamp-app-view"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
            echo "tags=${IMG}:${V},${IMG}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMG}:sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.v.outputs.tags }}
